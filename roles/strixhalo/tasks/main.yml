---
# Default task file for schutzpunkt/strixhalo


- name: Set hostname to {{ strixhalo_hostname }}.{{ strixhalo_domain }}
  ansible.builtin.hostname:
    name: "{{ strixhalo_hostname }}.{{ strixhalo_domain }}"
    use: systemd
  become: true

# Grow the root LV to 100 % of free space (and resize the FS)
- name: Extend the root LV and resize its filesystem
  lvol:
    vg: fedora
    lv: root
    size: +100%FREE
    resizefs: true
    force: true
  become: true
  when: root_lv_path is defined

# Modify GRUB kernel parameters to include extra params, avoiding duplicates
- name: Check current GRUB command line
  shell: grep '^GRUB_CMDLINE_LINUX=' {{ grub_defaults_file }}
  register: grub_check
  changed_when: false
  failed_when: false

- name: Extract parameter names to check
  set_fact:
    param_names: "{{ extra_grub_params.split() | map('regex_replace', '=.*', '') | list }}"

- name: Remove existing instances of parameters and add new ones
  lineinfile:
    path: "{{ grub_defaults_file }}"
    regexp: '^GRUB_CMDLINE_LINUX='
    line: 'GRUB_CMDLINE_LINUX="{{ grub_current_params }} {{ extra_grub_params }}"'
    backrefs: no
  vars:
    grub_current_params: "{{ grub_check.stdout | regex_replace('^GRUB_CMDLINE_LINUX=\"(.*)\"$', '\\1') | regex_replace('\\s*(amd_iommu|amdgpu\\.gttsize|ttm\\.pages_limit)=\\S+', '') | trim }}"
  when: extra_grub_params not in grub_check.stdout
  become: true

- name: Rebuild grub.cfg
  command: grub2-mkconfig -o "{{ grub_cfg_path }}"
  become: true

# System update & package installation
- name: Update all packages (dnf update)
  dnf:
    name: "*"
    state: latest
    update_cache: yes
  become: true
  when: '"update" in ansible_run_tags'
  tags: update

- name: Install required packages
  dnf:
    name: "{{ base_packages }}"
    state: present
  become: true

# Firmware downgrade if needed
- name: Check current linux-firmware version
  shell: rpm -qa | grep '^linux-firmware-[0-9]'
  register: firmware_check
  changed_when: false
  failed_when: false

- name: Display current firmware packages
  debug:
    msg: "Current linux-firmware packages: {{ firmware_check.stdout_lines }}"

- name: Extract firmware version number
  set_fact:
    current_fw_version: "{{ firmware_check.stdout | regex_search('linux-firmware-(\\d+)', '\\1') | first }}"
  when: firmware_check.stdout != ""

- name: Display extracted version
  debug:
    msg: "Extracted version: {{ current_fw_version }}"
  when: current_fw_version is defined

