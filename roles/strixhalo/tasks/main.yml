# Clone the amd‑strix‑halo‑toolboxes repository
- name: Ensure the toolboxes repo is present
  git:
    repo: "{{ toolbox_repo_url }}"
    dest: "{{ toolbox_repo_dest }}"
    version: HEAD
    force: no
    update: yes

- name: Check which toolboxes exist
  command: podman container exists {{ item.name }}
  loop: "{{ toolboxes }}"
  register: toolbox_check
  failed_when: false
  changed_when: false

- name: Pre-pull images for missing toolboxes only (may take a while for large images)
  command: podman pull {{ item.item.image }}
  loop: "{{ toolbox_check.results }}"
  when: item.rc != 0
  retries: 3
  delay: 60
  register: pull_result
  until: pull_result.rc == 0

- name: Create missing toolboxes (images already pulled, so this is fast)
  shell: |
    toolbox create {{ item.item.name }} \
      --image {{ item.item.image }} \
      --assumeyes \
      -- {{ item.item.extra_opts | trim }}
  when: item.rc != 0
  loop: "{{ toolbox_check.results }}"


# Update each toolbox using the repo helper script
- name: Refresh each toolbox using the repo helper script (this may take a while as images of a few GB are downloaded)
  command: "{{ toolbox_repo_dest }}/refresh-toolboxes.sh {{ item.name }}"
  args:
    chdir: "{{ toolbox_repo_dest }}"
  loop: "{{ toolboxes }}"
  when: '"update" in ansible_run_tags'
  tags: update


# Set llama ROCm version based on kernel version
- name: Set llama ROCm version based on kernel version
  set_fact:
    llama_rocm_version: llama-rocm7-nightlies
    # llama_rocm_version: >-
    #   {{ 'llama-rocm7-nightlies'
    #       if ansible_kernel is version('6.18.4', '>=')
    #       else 'llama-rocm-7.2' }}

- name: Show selected ROCm version
  debug:
    msg: "Kernel={{ ansible_kernel }}, using {{ llama_rocm_version }} read more at {{ toolbox_repo_url }}"


# Create the model directory
- name: Ensure the model directory exists
  file:
    path: "{{ model_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"

# Download each model file if not already present
- name: Get list of existing model files (faster for network mounts)
  find:
    paths: "{{ model_dir }}"
    patterns: "*.gguf"
  register: existing_models

- name: Create list of existing filenames
  set_fact:
    existing_filenames: "{{ existing_models.files | map(attribute='path') | map('basename') | list }}"

- name: Download missing model files
  get_url:
    url: "{{ item }}"
    dest: "{{ model_dir }}/{{ item | basename }}"
    mode: "0644"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
    timeout: 3600
  loop: "{{ model_urls }}"
  when: item | basename not in existing_filenames
  become: false

# Create llama-swap configuration file
# note, that volume is not re-created upon playbook re-run, your changes will persist (but you also cant set a new password once set)
- name: Run Open WebUI container
  containers.podman.podman_container:
    name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    state: started
    restart_policy: always
    network: host
    volumes:
      - open-webui:/app/backend/data
    env:
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_KEY: "{{ strixhalo_llama_swap_openai_api_key | default(omit, true) }}"
      OPENAI_API_BASE_URL: "http://localhost:8081/v1"
      DEFAULT_MODELS: "qwen3.5-122b"
      WEBUI_AUTH: "True"
      WEBUI_ADMIN_NAME: "admin"
      WEBUI_ADMIN_EMAIL: "{{ strixhalo_open_webui_admin_email }}"
      WEBUI_ADMIN_PASSWORD: "{{ strixhalo_open_webui_admin_password }}"
    recreate: yes
    pull: always

- name: Enable podman auto-restart for user containers
  systemd:
    name: podman-restart
    enabled: yes
    state: started
    scope: user
  become: false

- name: Create llama-swap directory
  file:
    path: "{{ llama_swap_path }}"
    state: directory
    mode: "0755"

- name: Get latest llama-swap release URL
  uri:
    url: "{{ llama_swap_releases_url }}"
    return_content: yes
  register: llama_swap_release

- name: Extract download URL for linux_amd64
  set_fact:
    llama_swap_url: "{{ llama_swap_release.json.assets | selectattr('browser_download_url', 'search', 'linux_amd64') | map(attribute='browser_download_url') | first }}"

- name: Download llama-swap
  get_url:
    url: "{{ llama_swap_url }}"
    dest: "{{ llama_swap_path }}/llama-swap_latest_linux_amd64.tar.gz"
    mode: "0644"

- name: Extract llama-swap
  unarchive:
    src: "{{ llama_swap_path }}/llama-swap_latest_linux_amd64.tar.gz"
    dest: "{{ llama_swap_path }}/"
    remote_src: yes

- name: Copy llama-swap config
  template:
    src: config.yaml.j2
    dest: "{{ llama_swap_path }}/config.yaml"
    mode: "0644"

- name: Ensure user systemd directory exists
  file:
    path: "{{ user_systemd_dir }}"
    state: directory
    mode: "0755"

- name: Install llama-swap user service
  copy:
    dest: "{{ user_systemd_dir }}/llama-swap.service"
    mode: "0644"
    content: |
      [Unit]
      Description=LLaMA Swap Service
      After=network.target

      [Service]
      Type=simple
      ExecStart=%h/llama-swap/llama-swap --config %h/llama-swap/config.yaml --listen localhost:8081
      Restart=on-failure
      RestartSec=5
      WorkingDirectory=%h/llama-swap

      [Install]
      WantedBy=default.target
  register: service_file

- name: Reload user systemd daemon
  command: systemctl --user daemon-reexec
  when: service_file.changed

- name: Enable llama-swap service
  command: systemctl --user enable llama-swap
  changed_when: false

- name: Re-Start llama-swap service
  command: systemctl --user restart llama-swap
  changed_when: false

- name: Enable user lingering (start services at boot)
  become: true
  command: loginctl enable-linger {{ ansible_user_id }}
  changed_when: false

# Path of this role for later use as role_path can not be used in included roles
- name: Capture role path before any include_role calls
  set_fact:
    this_role_path_lookup: "{{ role_path }}"
  changed_when: false

- name: Include role to setup nginx reverse proxy with certificate
  include_role:
    name: nginx_reverse_proxy
    public: yes
  vars:
    nginx_config_template: "{{ this_role_path_lookup }}/templates/nginx.conf.j2"
    nginx_subdomains:
    - name: llamaswap
      port: 8081
    - name: openwebui
      port: 8080

- name: StrixHalo is ready
  debug:
    msg:
      - "Fedora Web: https://{{ ansible_hostname }}.{{ ansible_domain }}"
      - "llama-swap: https://llamaswap.{{ ansible_hostname }}.{{ ansible_domain }} (Authorization header required: {{ 'yes - Authorization: Bearer ' + strixhalo_llama_swap_openai_api_key if strixhalo_llama_swap_openai_api_key else 'no' }})"
      - "Open WebUI: https://openwebui.{{ ansible_hostname }}.{{ ansible_domain }}"
